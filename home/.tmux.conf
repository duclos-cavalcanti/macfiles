# Prefix
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -s escape-time 1
set -g base-index 0
set -g pane-base-index 0
set -g display-panes-time 3000
set -g repeat-time 1000
set -g focus-events on
set -g automatic-rename off
set -g renumber-windows on
setw -g mode-keys vi
setw -g aggressive-resize on

# Hooks
set-hook -g client-focus-in                 'resize-window -A'
set-hook -g client-attached                 'resize-window -A'
set-hook -g client-resized                  'resize-window -A'

# Copy mode
bind y copy-mode
bind -T copy-mode-vi  v  send-keys -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Panes — management
bind x kill-pane

# Panes — navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind o select-pane -t :.+
bind O select-pane -t :.-
bind -r \; last-pane

# Windows — navigation
bind -r p select-window -t :-
bind -r n select-window -t :+
bind -r ` last-window

# Windows — reordering
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Windows — resizing
bind C-l resize-window -A

# Sessions
bind -r L switch-client -l
bind -r ) switch-client -n
bind -r ( switch-client -p

# Appearance — panes
set -g pane-border-style 'fg=white'
set -g pane-active-border-style 'fg=blue'
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# Appearance — status bar
bind t set -g status
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style                 'bg=green,fg=white'
set -g message-style                'fg=white'
set -g message-command-style        'fg=white'

set -g status-left                  '#[fg=black] #S: '
set -g status-left-length           30
set -g window-status-separator      ''
set -g window-status-format         '#[fg=black] #I:#W  '
set -g window-status-current-format '#[fg=black] #I:#W#{?window_marked_flag,+,*}#{?window_zoomed_flag, Z,} '
set -g status-right                 '#[fg=black]#h '

# Actions
bind r      source-file ~/.tmux.conf
bind f      run-shell "~/.mady/bin/adapters/tmux/branch.sh --cwd '#{pane_current_path}'"
