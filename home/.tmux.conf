# Prefix
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -s escape-time 1
set -g base-index 0
set -g pane-base-index 0
set -g display-panes-time 3000
set -g repeat-time 1000
set -g focus-events on
set -g automatic-rename off
set -g renumber-windows on
setw -g mode-keys vi

# Hooks
set-hook -g client-focus-in                 'resize-window -A'
set-hook -g client-attached                 'resize-window -A'
set-hook -g client-resized                  'resize-window -A'

# Copy mode
bind y copy-mode
bind -T copy-mode-vi  v  send-keys -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Panes — management
bind x kill-pane

# Panes — navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind o select-pane -t :.+
bind O select-pane -t :.-
bind -r \; last-pane
bind -n M-Tab select-pane -t :.+ \; resize-pane -Z

# Windows — navigation
bind -r p select-window -t :-
bind -r n select-window -t :+
bind -r ` last-window

# Windows — reordering
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Windows — resizing
bind C-l resize-window -A

# Sessions
bind -r L switch-client -l
bind 0 run-shell 'tmux switch-client -t "$(tmux list-sessions -F "#{session_name}" | head -1)"'
bind -r ) switch-client -n
bind -r ( switch-client -p

# Scripts
bind Enter      run-shell "~/.tmux/terminal.sh"
bind E          run-shell "~/.tmux/edit.sh"

# Appearance — panes
set -g pane-border-style 'fg=white'
set -g pane-active-border-style 'fg=blue'
set -g window-style 'bg=colour236'
set -g window-active-style 'bg=colour235'

# Appearance — status bar
bind t set -g status
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-style 'fg=white,bg=red,bold'
set -g message-style 'fg=default'
set -g message-command-style 'fg=default'

if-shell '[ "$(tmux -V | cut -c6- | cut -d. -f1)" -ge 3 ]' {
    set -g status-format[0] '#(~/.tmux/statusline/primary.sh)'
    # set -g status 2
    # set -g status-format[1] '#(~/.tmux/statusline/primary.sh)'
    # set -g status-format[0] '#(~/.tmux/statusline/secondary.sh)'
} {
    set -g status-format[0] '#(~/.tmux/statusline/primary.sh)'
}

set -g status-format[0] '#(~/.tmux/statusline/primary.sh)'

# Source
bind r source-file ~/.tmux.conf \; display-message "reloaded config"
