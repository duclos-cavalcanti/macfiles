# General
set -g prefix C-a
bind C-a send-prefix
set -g mouse on
set -s escape-time 1
set -g base-index 1
set -g pane-base-index 1
set -g display-panes-time 3000
set -g focus-events on
set -g automatic-rename off
setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "reloaded config!"

# Hooks
set-hook -g client-focus-in                 'resize-window -A'
set-hook -g client-attached                 'resize-window -A'
set-hook -g client-resized                  'resize-window -A'
set-hook -g window-linked                   'refresh-client -S'
set-hook -g window-unlinked                 'refresh-client -S'
set-hook -g session-window-changed          'refresh-client -S'
set-hook -g session-created                 'refresh-client -S'
set-hook -g session-closed                  'refresh-client -S'
set-hook -g client-session-changed          'resize-window -A \; refresh-client -S \; run-shell "rm -f ~/.cache/claude-signals/#{session_name}"'
set-hook -g after-select-window             'refresh-client -S'

# Copy mode
unbind y
unbind [
bind y copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Panes — navigation
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D
bind z resize-pane -Z
bind m select-pane -m
unbind '"'
bind '"' select-pane -t '~'

# Panes — splitting
unbind %
bind v split-window -h
bind s split-window

# Panes — resizing
bind -r down  resize-pane -D
bind -r up    resize-pane -U
bind -r left  resize-pane -L
bind -r right resize-pane -R
bind C-l resize-window -A

# Panes — management
bind x kill-pane

# Windows — navigation
bind -r b select-window -t :-
bind -r n select-window -t :+
bind -r -n M-h select-window -t :-
bind -r -n M-l select-window -t :+

# Windows — reordering
bind -r B swap-window -t -1 \; previous-window
bind -r N swap-window -t +1 \; next-window
bind -r -n M-H swap-window -t -1 \; previous-window
bind -r -n M-L swap-window -t +1 \; next-window

# Sessions
bind X kill-session
bind -r L switch-client -l
bind -r ) switch-client -n
bind -r ( switch-client -p

# Scripts
bind Enter      run-shell "~/.tmux/terminal.sh"
bind Space      command-prompt -p "session name:" "run-shell '~/.tmux/break.sh %%'"
bind C          run-shell "~/.tmux/launch.sh"
bind W          run-shell "~/.tmux/sessions.sh"
bind G          run-shell "~/.tmux/worktree.sh"
bind E          run-shell "~/.tmux/scratch.sh"

# Appearance — panes
set -g pane-border-style 'fg=white'
set -g pane-active-border-style 'fg=blue'
set -g window-style 'bg=colour236'
set -g window-active-style 'bg=colour235'

# Appearance — status bar
bind t set -g status
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-style 'fg=white,bg=default,bold'
set -g message-style 'fg=default'
set -g message-command-style 'fg=default'

if-shell '[ "$(tmux -V | cut -c6- | cut -d. -f1)" -ge 3 ]' {
    set -g status 2
    set -g status-format[0] '#(~/.tmux/statusline_secondary.sh)'
    set -g status-format[1] '#(~/.tmux/statusline_primary.sh)'
} {
    set -g status-format[0] '#(~/.tmux/statusline_primary.sh)'
}
