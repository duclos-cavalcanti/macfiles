# Prefix
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -s escape-time 1
set -g base-index 0
set -g pane-base-index 0
set -g display-panes-time 3000
set -g repeat-time 1000
set -g focus-events on
set -g automatic-rename off
set -g renumber-windows on
setw -g mode-keys vi
setw -g aggressive-resize on

# Hooks
set-hook -g client-focus-in                 'resize-window -A'
set-hook -g client-attached                 'resize-window -A'
set-hook -g client-resized                  'resize-window -A'

# Copy mode
bind y copy-mode
bind -T copy-mode-vi  v  send-keys -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Panes — management
bind x kill-pane

# Panes — navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind o select-pane -t :.+
bind O select-pane -t :.-
bind -r \; last-pane

# Windows — navigation
bind -r p select-window -t :-
bind -r n select-window -t :+
bind -r ` last-window

# Windows — reordering
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Windows — resizing
bind C-l resize-window -A

# Sessions
bind -r L switch-client -l
bind -r ) switch-client -n
bind -r ( switch-client -p

# Status
bind t      set -g status

# Actions
bind r      source-file ~/.tmux.conf
bind f      run-shell "~/.mady/bin/adapters/tmux/branch.sh --cwd '#{pane_current_path}'"
bind g      display-popup -E -w 90% -h 90% -d "#{session_path}" "lazygit --screen-mode half"

# Appearance --messages
set -g message-style                'fg=white'
set -g message-command-style        'fg=white'

# Appearance --panes
set -g pane-border-style            'fg=white'
set -g pane-active-border-style     'fg=blue'
set -g window-style                 'bg=default'
set -g window-active-style          'bg=default'

# Appearance --status bar (minimal: transparent bar, centered, accent pill on active)
# semi710/minimal-tmux-status, inlined (no plugin). accent = ANSI blue (tracks terminal).
set -g status on
set -g status-position              bottom
set -g status-justify               centre
set -g status-interval              5

# transparent — no full-width colored bar
set -g status-style                 'bg=default,fg=default'

# left: prefix indicator (only while prefix held).  right: session name.
set -g status-left-length           20
set -g status-right-length          20
set -g status-left                  '#[fg=blue,bold]#{?client_prefix, tmux ,      }'
set -g status-right                 '#[fg=default] #S '

# windows: plain when inactive; blue pill with round caps when active
set -g window-status-separator      ''
set -g window-status-format         ' #I:#W '
set -g window-status-current-format '#[fg=blue]#[bg=blue,fg=black] #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=blue,bg=default]'
