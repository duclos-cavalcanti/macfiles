# Prefix
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -s escape-time 1
set -g base-index 0
set -g pane-base-index 0
set -g display-panes-time 3000
set -g repeat-time 1000
set -g focus-events on
set -g automatic-rename off
set -g renumber-windows on
setw -g mode-keys vi
setw -g aggressive-resize on

# Hooks
set-hook -g client-focus-in                 'resize-window -A'
set-hook -g client-attached                 'resize-window -A'
set-hook -g client-resized                  'resize-window -A'

# Copy mode
bind y copy-mode
bind -T copy-mode-vi  v  send-keys -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Slow scroll (repeatable). In mouse-reporting apps (claude/nvim) synthesize a
# real SGR wheel event so the APP scrolls like the touchpad (64=up, 65=down;
# ;1;1 = coords); in plain panes fall back to tmux copy-mode.
bind -r C-u if -F "#{mouse_any_flag}" "send-keys -H 1b 5b 3c 36 34 3b 31 3b 31 4d" "copy-mode -e"
bind -r C-d if -F "#{mouse_any_flag}" "send-keys -H 1b 5b 3c 36 35 3b 31 3b 31 4d" "copy-mode -e"

# Panes — management
bind x kill-pane

# Panes — navigation
bind o select-pane -t :.+
bind O select-pane -t :.+ \; resize-pane -Z   # next pane, then zoom it
bind -r \; last-pane

# Windows — navigation
bind -r p select-window -t :-
bind -r n select-window -t :+
bind -r l last-window

# Windows — reordering
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Windows — resizing
bind C-l resize-window -A

# Sessions
bind -r L switch-client -l
bind -r ) switch-client -n
bind -r ( switch-client -p

# Status
bind t      set -g status

# Actions
bind r      source-file ~/.tmux.conf \; refresh-client -S \; display "config reloaded"

bind Enter  resize-pane -Z

bind h      run-shell '~/.bin/harpoon add'
bind H      display-popup -E -w 50% -h 40% '~/.bin/harpoon pick'
bind e      display-popup -E -w 80% -h 80% '~/.bin/harpoon edit'
bind 1      run-shell '~/.bin/harpoon go 1'
bind 2      run-shell '~/.bin/harpoon go 2'
bind 3      run-shell '~/.bin/harpoon go 3'
bind 4      run-shell '~/.bin/harpoon go 4'
bind 5      run-shell '~/.bin/harpoon go 5'

# Appearance --messages
set -g message-style                'fg=white'
set -g message-command-style        'fg=white'

# Appearance --panes
set -g pane-border-style            'fg=white'
set -g pane-active-border-style     'fg=blue'
set -g window-style                 'bg=default'
set -g window-active-style          'bg=default'

# Appearance --status bar
set -g status on
set -g status-position              bottom
set -g status-justify               centre
set -g status-interval              5

# transparent — no full-width colored bar
set -g status-style                 'bg=default,fg=default'

# status-left is ALWAYS leftmost and the window list renders after it, so to put
# the windows at the far-left edge status-left must be empty. sysinfo + prefix
# indicator + session live on the right instead.
set -g status-left-length           20
set -g status-right-length          100
set -g status-left                  ' -> #S #[fg=green,bold]#{?client_prefix,  ,   }'
set -g status-right                 '#[fg=white]#(~/.bin/sysinfo)#[default] '   # disk/mem/cpu via shared ~/.bin/sysinfo

# windows: plain when inactive; blue pill with round caps when active
set -g window-status-separator      ''
set -g window-status-format         ' #I:#W '
set -g window-status-current-format '#[fg=blue]#[bg=blue,fg=black] #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=blue,bg=default]'
