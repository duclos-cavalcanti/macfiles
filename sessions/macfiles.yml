session_name: MACFILES
start_directory: ~/.macfiles
windows:
  - window_name: main
    layout: even-horizontal
    panes:
      - claude
      - cd home && nvim .
  - window_name: shell
    shell_command_before:
      - cd home/
    panes:
      - nvim .zshrc
  - window_name: nvim
    shell_command_before:
      - cd home/.config/nvim
    panes:
      - nvim init.lua
  - window_name: tmux
    panes:
      - nvim home/.tmux.conf
  - window_name: auto
    shell_command_before:
      - cd home/.hammerspoon
    panes:
      - nvim init.lua
