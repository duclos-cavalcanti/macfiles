session_name: MACFILES
start_directory: ~/.macfiles
windows:
  - window_name: main
    layout: even-horizontal
    panes:
      - claude
      - cd home && nvim .tmux.conf -c ":tabedit .zshrc | tabedit .bashrc | tabnext"
  - window_name: nvim
    shell_command_before:
      - cd home/.config/nvim
    panes:
      - nvim init.lua
  - window_name: os
    shell_command_before:
      - cd home/.hammerspoon
    panes:
      - nvim init.lua
